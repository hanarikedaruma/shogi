<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>本格対面将棋</title>
    <script src="https://cdn.jsdelivr.net/npm/shogi.js@1.1.0/dist/shogi.min.js"></script>
    <style>
        :root { --bg-color: #f0e68c; --board-color: #e3c16f; --cell-size: calc(100vw / 10.5); }
        body { margin: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: "Hiragino Mincho ProN", serif; touch-action: none; overflow: hidden; }
        
        /* 手番表示 */
        #turn-indicator { margin: 10px; padding: 5px 20px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .turn-sente { background: #333; color: white; }
        .turn-gote { background: #333; color: white; transform: rotate(180deg); }

        /* 持ち駒エリア */
        .hand { display: flex; width: 90vw; height: 40px; background: rgba(0,0,0,0.05); align-items: center; padding: 2px 10px; border-radius: 5px; margin: 5px 0; font-size: 0.9rem; }
        .hand.gote { transform: rotate(180deg); }

        /* 盤面 */
        #board { display: grid; grid-template-columns: repeat(9, var(--cell-size)); grid-template-rows: repeat(9, var(--cell-size)); border: 2px solid #333; background: var(--board-color); }
        .cell { border: 0.2px solid rgba(0,0,0,0.3); box-sizing: border-box; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* ハイライト */
        .selected { background: rgba(255, 255, 0, 0.6) !important; }
        .movable { background: rgba(0, 255, 0, 0.2); }
        .last-move { background: rgba(255, 100, 100, 0.3); }

        /* 駒 */
        .piece { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: calc(var(--cell-size) * 0.7); cursor: pointer; user-select: none; }
        .p-gote { transform: rotate(180deg); }
        .promoted { color: #d32f2f; }
    </style>
</head>
<body>

<div id="hand-gote" class="hand gote"></div>
<div id="turn-indicator" class="turn-sente">先手の手番です</div>

<div id="board"></div>

<div id="hand-sente" class="hand sente"></div>

<script>
    const { Shogi, Color, Piece } = shogi;
    const game = new Shogi();
    let selectedPos = null;
    let movableHints = [];

    // 駒の名前変換
    const pieceMap = { "FU": "歩", "KY": "香", "KE": "桂", "GI": "銀", "KI": "金", "KA": "角", "HI": "飛", "OU": "玉", "TO": "と", "NY": "杏", "NK": "圭", "NG": "全", "UM": "馬", "RY": "龍" };

    function init() {
        render();
    }

    function render() {
        const boardEl = document.getElementById('board');
        const turnEl = document.getElementById('turn-indicator');
        boardEl.innerHTML = '';

        // 手番表示
        const isSente = game.turn === Color.Sente;
        turnEl.textContent = isSente ? "先手の手番です" : "後手の手番です";
        turnEl.className = isSente ? "turn-sente" : "turn-gote";

        // 盤面描画
        for (let y = 1; y <= 9; y++) {
            for (let x = 9; x >= 1; x--) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                const piece = game.get(x, y);
                const isSelected = selectedPos && selectedPos.x === x && selectedPos.y === y;
                const isMovable = movableHints.some(m => m.to.x === x && m.to.y === y);

                if (isSelected) cell.classList.add('selected');
                if (isMovable) cell.classList.add('movable');

                if (piece) {
                    const pEl = document.createElement('div');
                    pEl.className = `piece ${piece.color === Color.Gote ? 'p-gote' : ''} ${piece.isPromoted() ? 'promoted' : ''}`;
                    pEl.textContent = pieceMap[piece.symbol] || piece.symbol;
                    cell.appendChild(pEl);
                }

                cell.onclick = () => handleClick(x, y);
                boardEl.appendChild(cell);
            }
        }

        // 持ち駒描画
        renderHand('hand-sente', Color.Sente);
        renderHand('hand-gote', Color.Gote);
    }

    function renderHand(id, color) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        const counts = game.getHandsSummary(color);
        for (let symbol in counts) {
            if (counts[symbol] > 0) {
                const span = document.createElement('div');
                span.style.marginRight = "10px";
                span.textContent = `${pieceMap[symbol]}${counts[symbol] > 1 ? counts[symbol] : ''}`;
                span.onclick = (e) => {
                    e.stopPropagation();
                    handleHandClick(symbol, color);
                };
                el.appendChild(span);
            }
        }
    }

    function handleClick(x, y) {
        if (selectedPos) {
            // 移動実行
            try {
                // 成れるかどうかの判定
                let promo = false;
                const move = movableHints.find(m => m.to.x === x && m.to.y === y);
                
                if (move) {
                    // 簡易的に：成れる場合は常に成るか、ダイアログを出す（ここでは確認）
                    if (game.get(selectedPos.x, selectedPos.y).canPromote(y) || (selectedPos.y && game.get(selectedPos.x, selectedPos.y).color === Color.Sente && y <= 3)) {
                        if (confirm("成りますか？")) promo = true;
                    }
                    game.move(selectedPos.x, selectedPos.y, x, y, promo);
                }
            } catch (e) {
                console.log("Invalid Move", e);
            }
            selectedPos = null;
            movableHints = [];
        } else {
            // 駒選択
            const piece = game.get(x, y);
            if (piece && piece.color === game.turn) {
                selectedPos = { x, y };
                movableHints = game.getMovesFrom(x, y);
            }
        }
        render();
    }

    function handleHandClick(symbol, color) {
        if (game.turn !== color) return;
        // 持ち駒を打つ処理のロジック（簡略化のため今回は選択のみヒント表示）
        alert(pieceMap[symbol] + "を打つ場所をタップしてください（ロジック実装中）");
        // ※実際には game.getDropsFrom(symbol) を使用
    }

    init();
</script>
</body>
</html>
