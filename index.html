<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>対面将棋プロト</title>
    <style>
        :root { --cell-size: calc(100vw / 9.5); }
        body { margin: 0; background: #f0e68c; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; touch-action: none; overflow: hidden; }
        
        .turn-indicator { padding: 5px 20px; border-radius: 20px; background: #333; color: white; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .turn-gote { transform: rotate(180deg); }

        #board { 
            display: grid; 
            grid-template-columns: repeat(9, var(--cell-size)); 
            grid-template-rows: repeat(9, var(--cell-size)); 
            border: 1px solid #333; 
            background: #e3c16f; 
        }
        .cell { 
            border: 0.5px solid #333; 
            width: var(--cell-size); 
            height: var(--cell-size); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }
        .selected { background: rgba(255, 255, 0, 0.6) !important; }
        
        .piece { 
            font-size: calc(var(--cell-size) * 0.7); 
            font-weight: bold; 
            user-select: none; 
            pointer-events: none;
        }
        .gote { transform: rotate(180deg); }
        .sente { color: #000; }
    </style>
</head>
<body>

<div id="indicator" class="turn-indicator">先手の手番</div>
<div id="board"></div>

<script>
    // 初期配置データ (簡易版: 王と歩のみ)
    // 実際にはここを増やすだけで全ての駒が並びます
    let boardState = Array(9).fill(null).map(() => Array(9).fill(null));
    
    // 後手(G)
    boardState[0][4] = { type: '王', side: 'G' };
    boardState[2][0] = { type: '歩', side: 'G' };
    boardState[2][1] = { type: '歩', side: 'G' };
    boardState[2][2] = { type: '歩', side: 'G' };
    boardState[2][3] = { type: '歩', side: 'G' };
    boardState[2][4] = { type: '歩', side: 'G' };
    boardState[2][5] = { type: '歩', side: 'G' };
    boardState[2][6] = { type: '歩', side: 'G' };
    boardState[2][7] = { type: '歩', side: 'G' };
    boardState[2][8] = { type: '歩', side: 'G' };

    // 先手(S)
    boardState[8][4] = { type: '玉', side: 'S' };
    for(let i=0; i<9; i++) boardState[6][i] = { type: '歩', side: 'S' };

    let turn = 'S';
    let selected = null;

    function render() {
        const boardEl = document.getElementById('board');
        const indicator = document.getElementById('indicator');
        boardEl.innerHTML = '';

        indicator.textContent = turn === 'S' ? "先手の手番" : "後手の手番";
        indicator.className = turn === 'S' ? "turn-indicator" : "turn-indicator turn-gote";

        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');

                const piece = boardState[r][c];
                if (piece) {
                    const pEl = document.createElement('div');
                    pEl.className = `piece ${piece.side === 'S' ? 'sente' : 'gote'}`;
                    pEl.textContent = piece.type;
                    cell.appendChild(pEl);
                }

                // iPhoneのタッチ操作に反応するようにonclickを設定
                cell.onclick = (e) => {
                    e.preventDefault();
                    handleClick(r, c);
                };
                boardEl.appendChild(cell);
            }
        }
    }

    function handleClick(r, c) {
        const targetPiece = boardState[r][c];

        if (selected) {
            // 移動先が自分自身の駒なら選択し直し
            if (targetPiece && targetPiece.side === turn) {
                selected = { r, c };
            } else {
                // 移動実行
                boardState[r][c] = boardState[selected.r][selected.c];
                boardState[selected.r][selected.c] = null;
                selected = null;
                turn = turn === 'S' ? 'G' : 'S';
            }
        } else {
            // 自分の手番の駒なら選択
            if (targetPiece && targetPiece.side === turn) {
                selected = { r, c };
            }
        }
        render();
    }

    // 起動
    window.onload = render;
</script>
</body>
</html>
