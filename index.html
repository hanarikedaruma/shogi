<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>本格対面将棋</title>
    <script src="https://unpkg.com/shogi.js@1.1.0/dist/shogi.min.js"></script>
    <style>
        :root { 
            /* iPhone 13の横幅に合わせた計算。余白を考慮して9.5分割 */
            --cell-size: calc(100vw / 9.8); 
        }
        body { 
            margin: 0; 
            background: #f0e68c; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif; 
            touch-action: none; 
            overflow: hidden; 
        }
        
        #status-area { height: 40px; display: flex; align-items: center; justify-content: center; }
        .turn-box { padding: 4px 15px; border-radius: 15px; background: #333; color: #fff; font-size: 0.9rem; font-weight: bold; }
        .gote-turn { transform: rotate(180deg); }

        .hand { display: flex; width: 95vw; height: 35px; background: rgba(0,0,0,0.1); align-items: center; padding: 0 10px; border-radius: 5px; margin: 5px 0; font-size: 0.8rem; overflow: hidden; }
        .hand.gote { transform: rotate(180deg); }

        #board { 
            display: grid; 
            grid-template-columns: repeat(9, var(--cell-size)); 
            grid-template-rows: repeat(9, var(--cell-size)); 
            border: 1.5px solid #333; 
            background: #e3c16f; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .cell { 
            border: 0.2px solid rgba(0,0,0,0.2); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: var(--cell-size);
            height: var(--cell-size);
        }
        
        .selected { background: rgba(255, 255, 0, 0.5); }
        .movable { position: relative; }
        .movable::after { content: ""; width: 12px; height: 12px; background: rgba(0, 200, 0, 0.3); border-radius: 50%; position: absolute; }

        .piece { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: calc(var(--cell-size) * 0.65); font-weight: bold; }
        .p-gote { transform: rotate(180deg); }
        .promoted { color: #d32f2f; }
    </style>
</head>
<body>

<div id="hand-gote" class="hand gote"></div>
<div id="status-area"><div id="turn-indicator" class="turn-box">先手番</div></div>

<div id="board"></div>

<div id="hand-sente" class="hand sente"></div>

<script>
    // ライブラリの読み込み完了を待ってから実行
    window.onload = () => {
        if (typeof shogi === 'undefined') {
            alert("ライブラリの読み込みに失敗しました。再読み込みしてください。");
            return;
        }

        const { Shogi, Color } = shogi;
        const game = new Shogi();
        let selectedPos = null;
        let movableHints = [];

        const pieceMap = { "FU": "歩", "KY": "香", "KE": "桂", "GI": "銀", "KI": "金", "KA": "角", "HI": "飛", "OU": "玉", "TO": "と", "NY": "杏", "NK": "圭", "NG": "全", "UM": "馬", "RY": "龍" };

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            // 手番表示
            const turnEl = document.getElementById('turn-indicator');
            const isSente = game.turn === Color.Sente;
            turnEl.textContent = isSente ? "先手の手番です" : "後手の手番です";
            turnEl.className = isSente ? "turn-box" : "turn-box gote-turn";

            // 盤面描画
            for (let y = 1; y <= 9; y++) {
                for (let x = 9; x >= 1; x--) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const piece = game.get(x, y);
                    if (selectedPos && selectedPos.x === x && selectedPos.y === y) cell.classList.add('selected');
                    if (movableHints.some(m => m.to.x === x && m.to.y === y)) cell.classList.add('movable');

                    if (piece) {
                        const pEl = document.createElement('div');
                        pEl.className = `piece ${piece.color === Color.Gote ? 'p-gote' : ''} ${piece.isPromoted() ? 'promoted' : ''}`;
                        pEl.textContent = pieceMap[piece.symbol] || piece.symbol;
                        cell.appendChild(pEl);
                    }

                    cell.onclick = () => handleClick(x, y);
                    boardEl.appendChild(cell);
                }
            }
            renderHand('hand-sente', Color.Sente);
            renderHand('hand-gote', Color.Gote);
        }

        function handleClick(x, y) {
            const piece = game.get(x, y);

            if (selectedPos) {
                const move = movableHints.find(m => m.to.x === x && m.to.y === y);
                if (move) {
                    let promo = false;
                    // 成りの判定（3列目以内に入った、または出た場合）
                    const canPromo = game.get(selectedPos.x, selectedPos.y).canPromote(y);
                    if (canPromo) {
                        promo = confirm("成りますか？");
                    }
                    try {
                        game.move(selectedPos.x, selectedPos.y, x, y, promo);
                    } catch(e) { alert("反則です"); }
                }
                selectedPos = null;
                movableHints = [];
            } else {
                if (piece && piece.color === game.turn) {
                    selectedPos = { x, y };
                    movableHints = game.getMovesFrom(x, y);
                }
            }
            render();
        }

        function renderHand(id, color) {
            const el = document.getElementById(id);
            const counts = game.getHandsSummary(color);
            el.innerHTML = '';
            for (let sym in counts) {
                if (counts[sym] > 0) {
                    const d = document.createElement('div');
                    d.style.marginRight = "8px";
                    d.textContent = pieceMap[sym] + (counts[sym] > 1 ? counts[sym] : "");
                    el.appendChild(d);
                }
            }
        }

        render();
    };
</script>
</body>
</html>
