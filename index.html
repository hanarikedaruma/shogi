<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>対面将棋プロト</title>
    <style>
        body { margin: 0; background: #f0e68c; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: manipulation; }
        #board { display: grid; grid-template-columns: repeat(9, 1fr); width: 95vw; height: 95vw; max-width: 500px; max-height: 500px; border: 2px solid #333; background: #e3c16f; }
        .cell { border: 0.5px solid #333; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; position: relative; cursor: pointer; }
        .cell.selected { background: rgba(255, 255, 0, 0.5); }
        .cell.last-move { background: rgba(255, 100, 100, 0.3); }
        .piece { user-select: none; transition: transform 0.2s; }
        .gote { transform: rotate(180deg); color: #000; }
        .sente { color: #000; }
        .info { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info" id="status">先手の手番です</div>
<div id="board"></div>

<script>
    // 簡易的な初期配置 (歩などは省略、動作確認用)
    // S=先手, G=後手
    let boardState = Array(9).fill(null).map(() => Array(9).fill(null));
    boardState[0][0] = { type: '香', side: 'G' };
    boardState[0][4] = { type: '王', side: 'G' };
    boardState[8][4] = { type: '玉', side: 'S' };
    boardState[6][4] = { type: '歩', side: 'S' };

    let selected = null;
    let turn = 'S'; // S: 先手, G: 後手

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');

    function render() {
        boardEl.innerHTML = '';
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');
                
                const piece = boardState[r][c];
                if (piece) {
                    const pEl = document.createElement('span');
                    pEl.className = `piece ${piece.side === 'S' ? 'sente' : 'gote'}`;
                    pEl.textContent = piece.type;
                    cell.appendChild(pEl);
                }

                cell.onclick = () => handleClick(r, c);
                boardEl.appendChild(cell);
            }
        }
    }

    function handleClick(r, c) {
        const piece = boardState[r][c];

        if (selected) {
            // 移動処理
            if (selected.r === r && selected.c === c) {
                selected = null; // キャンセル
            } else {
                // 本来はここに詳細な移動ルール(shogi.js等)を入れる
                boardState[r][c] = boardState[selected.r][selected.c];
                boardState[selected.r][selected.c] = null;
                selected = null;
                turn = turn === 'S' ? 'G' : 'S';
                statusEl.textContent = turn === 'S' ? "先手の手番です" : "後手の手番です";
            }
        } else {
            // 選択処理
            if (piece && piece.side === turn) {
                selected = { r, c };
            }
        }
        render();
    }

    render();
</script>
</body>
</html>
