<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>本格対面将棋</title>

<style>

:root{

/* 画面幅いっぱい */
--board-size:calc(100vw - 8px);
--cell-size:calc(var(--board-size)/9);

--board-color:#e3c16f;
--piece-color:#ffebbc;

}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#f0e68c;
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:serif;
}

/* 駒台 */

.hand{
display:flex;
width:var(--board-size);
height:42px;
background:#d2b48c;
align-items:center;
padding:0 5px;
border-radius:4px;
border:1.5px solid #8b4513;
overflow-x:auto;
gap:4px;
box-sizing:border-box;
}

.hand.gote{
transform:rotate(180deg);
margin-bottom:14px;
}

.hand.sente{
margin-top:14px;
}

.turn-box{
padding:4px 15px;
border-radius:15px;
background:#222;
color:#fff;
font-size:0.8rem;
margin:8px 0;
}

.gote-turn{
transform:rotate(180deg);
}

/* 盤面 */

#board{

display:grid;

grid-template-columns:repeat(9,var(--cell-size));
grid-template-rows:repeat(9,var(--cell-size));

width:var(--board-size);
height:var(--board-size);

border:2px solid #333;

background:var(--board-color);

box-shadow:0 5px 20px rgba(0,0,0,0.4);

box-sizing:border-box;

}

.cell{

border:0.3px solid rgba(0,0,0,0.3);

display:flex;
align-items:center;
justify-content:center;

position:relative;

overflow:hidden;

}

/* 駒 */

.piece-shape{

width:68%;
height:68%;

background:var(--piece-color);

clip-path:polygon(
50% 0%,
100% 25%,
100% 100%,
0% 100%,
0% 25%
);

display:flex;
align-items:center;
justify-content:center;

font-size:calc(var(--cell-size)*0.42);

font-weight:bold;

border:0.5px solid #333;

box-sizing:border-box;

}

.p-gote{
transform:rotate(180deg);
}

.promoted{
color:#d32f2f;
background:#fff5e6;
}

.selected .piece-shape{
background:#ffeb3b;
outline:2px solid #f44336;
}

.movable::after{

content:"";

width:8px;
height:8px;

background:rgba(0,200,0,0.6);

border-radius:50%;

position:absolute;

}

/* JS部分（元コードそのまま） */

</style>
</head>

<body>

<div id="hand-gote" class="hand gote"></div>

<div id="turn-display" class="turn-box">先手番</div>

<div id="board"></div>

<div id="hand-sente" class="hand sente"></div>

<script>

/* JSはあなたの元コードをそのまま貼ればOK */

</script>

</body>
</html>
